<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FDF8F2">
<title>아이돌이 될거야!</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FDF8F2;--sf:#F8EFE4;--sf2:#F0E4D4;--tx:#5C4A3E;--tm:#8A7868;--th:#B8A898;--pink:#E8B4B8;--pink2:#D49498;--lav:#C8B5D9;--lav2:#A890C0;--rose:#D4A5A5;--rose2:#B8869A;--accent:#B8869A;--good:#88B8A8;--warn:#E8A878;--card:#FFFBF6;--paper:#FAF4E8;--border:#E0D0BC;--border2:#D4C0A8;--tape:#E8D4B0;--shadow:2px 3px 8px rgba(180,140,120,.15);--shadow2:3px 4px 12px rgba(180,140,120,.2)}
@media(prefers-color-scheme:dark){:root{--bg:#201820;--sf:#2A2028;--sf2:#342838;--tx:#F0E0E8;--tm:#C0A8B8;--th:#907888;--card:#2A2028;--paper:#2A2028;--border:#4A3848;--border2:#5A4858}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR','Gaegu',sans-serif;background:var(--bg);color:var(--tx);font-weight:400;background-image:url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 .7 0 0 0 0 .55 0 0 0 0 .45 0 0 0 .04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.hand{font-family:'Nanum Pen Script','Gaegu',cursive}
.gae{font-family:'Gaegu',cursive;font-weight:700}
#app{max-width:480px;margin:0 auto;min-height:100dvh;padding:env(safe-area-inset-top) 14px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch}

@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes jelly{0%,100%{transform:scale(1)}25%{transform:scale(.95,1.05)}50%{transform:scale(1.05,.95)}75%{transform:scale(.98,1.02)}}
@keyframes coinSpin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pixelBlink{0%,90%,100%{opacity:1}95%{opacity:.4}}
@keyframes pixelCursor{0%,100%{border-color:var(--gold)}50%{border-color:transparent}}

/* === PIXEL BORDER UTIL === */
.pix-border{border:4px solid var(--pix);box-shadow:var(--shadow),inset -2px -2px 0 rgba(0,0,0,.15),inset 2px 2px 0 rgba(255,255,255,.25);border-radius:0}
.pix-card{background:var(--card);border:4px solid var(--border);box-shadow:var(--shadow),inset -2px -2px 0 rgba(0,0,0,.1),inset 2px 2px 0 rgba(255,255,255,.3);border-radius:0}

/* === TABS === */
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(253,248,242,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;justify-content:center;z-index:100;padding:4px 0 env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(180,140,120,.1)}
.tabs-inner{display:flex;max-width:480px;width:100%}
.tab{flex:1;padding:8px 0;text-align:center;font-size:10px;color:var(--th);border:none;background:none;cursor:pointer;font-family:inherit;transition:all .25s;font-weight:500;letter-spacing:.5px}
.tab-icon{font-size:22px;display:block;margin-bottom:2px;transition:transform .25s}
.tab.active{color:var(--rose2);font-weight:700}
.tab.active .tab-icon{transform:scale(1.15)}

/* === DP CARD (data card) === */
.gp-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin:10px 0;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);position:relative}
.gp-bar::before{content:'';position:absolute;top:-6px;left:20px;width:60px;height:14px;background:rgba(232,212,176,.7);border-radius:2px;transform:rotate(-3deg);box-shadow:1px 1px 3px rgba(180,140,120,.2)}
.gp-coin{font-size:22px;animation:floaty 3s ease-in-out infinite}
.gp-info{text-align:left}
.gp-label{font-size:10px;color:var(--tm);font-weight:500;letter-spacing:1px}
.gp-val{font-size:22px;font-weight:700;color:var(--rose2);font-family:'Gaegu',cursive}
.gp-avail{font-size:10px;color:var(--th)}
.gp-streak{text-align:center;padding:6px 10px;background:var(--sf);border-radius:12px;border:1px solid var(--border)}
.gp-streak-num{font-size:16px;font-weight:700;color:var(--warn);font-family:'Gaegu',cursive}
.gp-streak-label{font-size:9px;color:var(--tm)}

/* === HEADER === */
.header{padding:18px 4px 8px;text-align:center;position:relative}
.header h1{font-size:26px;font-weight:700;color:var(--rose2);letter-spacing:2px;font-family:'Nanum Pen Script',cursive}
.header-sub{font-size:12px;font-weight:400;color:var(--tm);margin-top:2px;letter-spacing:1px;font-style:italic}
.header-date{font-size:11px;color:var(--th);margin-top:4px;font-family:'Gaegu',cursive}
.header-day{display:inline-block;margin-top:2px;padding:2px 10px;background:var(--sf);border-radius:20px;font-size:10px;color:var(--rose2);font-weight:700;border:1px dashed var(--border2)}
.quest-type{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:500;margin-top:4px;margin-bottom:0;letter-spacing:.5px}
.quest-type.str{background:rgba(232,180,184,.2);color:var(--rose2);border:1px solid var(--rose)}
.quest-type.sta{background:rgba(200,181,217,.2);color:var(--lav2);border:1px solid var(--lav)}

/* === SCHEDULE (Diary page) === */
.guild-board{position:relative;margin:12px 0;padding:22px 20px 20px;background:var(--paper);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow2);background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(200,160,140,.15) 31px,rgba(200,160,140,.15) 32px)}
.guild-board::before{content:'';position:absolute;top:-8px;right:24px;width:70px;height:18px;background:linear-gradient(135deg,rgba(232,180,184,.7),rgba(200,181,217,.6));border-radius:2px;transform:rotate(4deg);box-shadow:1px 2px 4px rgba(180,140,120,.2)}
.guild-board::after{content:'🌸';position:absolute;top:-2px;left:16px;font-size:14px;transform:rotate(-10deg)}
.board-title{font-family:'Nanum Pen Script',cursive;font-size:20px;color:var(--rose2);text-align:center;margin-bottom:12px;letter-spacing:1px}
.board-slots{display:flex;flex-direction:column;gap:2px}
.board-slot{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:14px;color:var(--tm);line-height:1.6;cursor:default;transition:all .25s;border-radius:8px;font-family:'Gaegu',cursive;font-weight:400}
.board-slot .step-check{width:18px;height:18px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--rose2)}
.board-slot .step-label{flex:1}
.board-slot .step-gp{font-size:11px;color:var(--th);white-space:nowrap}
.board-slot.now{background:linear-gradient(90deg,rgba(232,180,184,.25),rgba(200,181,217,.15));color:var(--rose2);font-weight:700}
.board-slot.now .step-check{border-color:var(--rose2);background:var(--rose)}
.board-slot.now .step-gp{color:var(--rose2)}
.board-slot.done-step{color:var(--th);opacity:.6;text-decoration:line-through;text-decoration-color:var(--border2)}
.board-slot.done-step .step-check{background:var(--good);border-color:var(--good);color:#fff}
.board-slot.done-step .step-check::before{content:'✓'}

/* === WEIGHT === */
.weight-row{display:flex;align-items:center;gap:8px;padding:6px 12px;margin:2px 0}
.weight-row .wv{font-size:16px;font-weight:400;flex:1;color:var(--blue)}
.weight-row .wv span{font-size:11px;color:var(--th);font-weight:400}
.weight-row input{width:60px;border:3px solid var(--border);border-radius:0;padding:6px;font-size:13px;text-align:center;background:var(--card);color:var(--tx);font-family:inherit}
.weight-row input:focus{border-color:var(--gold);outline:none}
.weight-row button{background:var(--blue);color:#fff;border:3px solid var(--blue2);border-radius:0;padding:6px 12px;font-size:12px;font-weight:400;font-family:inherit;cursor:pointer;box-shadow:var(--shadow)}
.weight-row button:active{transform:translateY(2px);box-shadow:none}

/* === QUEST BOARD (exercises) === */
.quest-board{margin:4px 0}
.quest-board-title{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--rose2);font-weight:700;margin-bottom:8px;padding:0 2px;font-family:'Gaegu',cursive}
.ex-list{display:flex;flex-direction:column;gap:10px}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow);transition:all .25s}
.ex-card.done{opacity:.5;border-style:dashed}
.ex-card.done .ex-name{text-decoration:line-through}
.ex-name{font-size:15px;font-weight:700;margin-bottom:2px;font-family:'Gaegu',cursive;color:var(--tx)}
.ex-desc{font-size:12px;color:var(--tm);margin-bottom:10px;font-weight:400}
.ex-sets{display:flex;gap:8px;flex-wrap:wrap}
.set-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border2);background:var(--sf);font-size:13px;font-weight:700;color:var(--tm);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Gaegu',cursive}
.set-btn.done{background:var(--rose);border-color:var(--rose2);color:#fff;box-shadow:0 3px 8px rgba(212,148,152,.3);animation:bounceIn .3s ease}
.set-btn:active{transform:scale(.9)}
.how-btn{font-size:12px;color:var(--lav2);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;font-weight:500}
.how-text{font-size:12px;color:var(--tm);line-height:1.7;margin-top:6px;white-space:pre-line;display:none;background:var(--sf);padding:10px;border-radius:10px;border:1px dashed var(--border2)}

/* === REST TIMER === */
.rest-timer{margin-top:8px;padding:8px 12px;background:var(--sf);border-radius:12px;display:flex;align-items:center;gap:8px;border:1px solid var(--border);animation:bounceIn .25s ease}
.rest-timer-bar{flex:1;height:8px;background:var(--sf2);border-radius:20px;overflow:hidden;border:1px solid var(--border2)}
.rest-timer-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--lav),var(--rose));transition:width .3s ease}
.rest-timer-text{font-size:12px;font-weight:700;color:var(--lav2);min-width:36px;text-align:right;font-family:'Gaegu',cursive}
.rest-timer.done-timer .rest-timer-fill{background:linear-gradient(90deg,var(--good),var(--rose))}
.rest-timer.done-timer .rest-timer-text{color:var(--good);animation:jelly .5s ease}

/* === PROGRESS === */
.progress-bar{height:10px;background:var(--sf2);border:1px solid var(--border2);border-radius:20px;margin:4px 0 2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--lav),var(--rose));transition:width .3s ease;border-radius:20px}
.progress-text{font-size:12px;color:var(--tm);text-align:center;margin-bottom:3px;font-weight:500}

/* === CARDIO === */
.walk-card{text-align:center;padding:24px 16px;margin:10px 0;border:1px solid var(--border);border-radius:14px;background:var(--card);box-shadow:var(--shadow)}
.walk-card h2{font-size:18px;margin-bottom:6px;font-weight:700;font-family:'Gaegu',cursive;color:var(--rose2)}
.walk-card p{font-size:12px;color:var(--tm);line-height:1.6;margin-bottom:12px}

/* === DONE CARD === */
.done-card{text-align:center;padding:24px 14px;margin:10px 0;animation:bounceIn .4s ease}
.done-card h2{font-size:22px;margin-bottom:6px;animation:jelly .6s ease;font-family:'Nanum Pen Script',cursive;color:var(--rose2)}
.done-card p{font-size:12px;color:var(--tm);margin-bottom:14px}
.done-btns{display:flex;flex-direction:column;gap:8px}

/* === BUTTONS === */
.btn-primary{padding:14px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;box-shadow:var(--shadow);transition:all .2s}
.btn-primary:active{transform:translateY(2px);box-shadow:0 1px 3px rgba(180,140,120,.15)}
.btn-ghost{padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:13px;color:var(--tx);cursor:pointer;font-family:inherit;width:100%;font-weight:500;box-shadow:var(--shadow);transition:all .2s}
.btn-ghost:active{transform:translateY(2px);box-shadow:0 1px 3px rgba(180,140,120,.1)}
.btn-skip{padding:10px;background:var(--sf);border:1px dashed var(--border2);border-radius:12px;font-size:12px;color:var(--th);cursor:pointer;font-family:inherit;width:100%;transition:all .2s}
.btn-skip:active{transform:translateY(2px)}
.btn-gold{padding:14px;background:linear-gradient(135deg,var(--rose) 0%,var(--lav) 100%);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;box-shadow:var(--shadow2);transition:all .2s;letter-spacing:.5px}
.btn-gold:active{transform:translateY(2px);box-shadow:var(--shadow)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed}

/* === SHOP ITEMS (Polaroid) === */
.shop-section{margin:14px 0}
.shop-section-title{font-size:16px;font-weight:700;color:var(--rose2);margin-bottom:10px;display:flex;align-items:center;gap:6px;font-family:'Gaegu',cursive}
.shop-item{background:#fff;border:1px solid var(--border);border-radius:4px;padding:10px 10px 14px;margin-bottom:14px;box-shadow:var(--shadow2);position:relative;transform:rotate(-.5deg);transition:all .25s}
.shop-item:nth-child(even){transform:rotate(.8deg)}
.shop-item:hover{transform:rotate(0) scale(1.01)}
.shop-item::before{content:'';position:absolute;top:-5px;left:50%;width:50px;height:12px;background:rgba(232,212,176,.7);border-radius:1px;transform:translateX(-50%) rotate(-2deg);box-shadow:1px 1px 3px rgba(180,140,120,.15)}
.shop-item.unlocked{border-color:var(--rose);background:#FFF8F5}
@media(prefers-color-scheme:dark){.shop-item.unlocked{background:#3A2028}}
.shop-item-top{display:flex;gap:12px;align-items:center}
.shop-item-img{width:80px;height:80px;border-radius:2px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;box-shadow:0 2px 6px rgba(180,140,120,.15)}
.shop-item-img.locked{filter:grayscale(.7) brightness(.95)}
.shop-item.unlocked .shop-item-img{border-color:var(--rose);filter:none}
.shop-item-info{flex:1;min-width:0}
.shop-item-name{font-size:15px;font-weight:700;font-family:'Gaegu',cursive;color:var(--tx)}
.shop-item-price{font-size:11px;color:var(--tm)}
.shop-item-cost{display:inline-block;margin-top:4px;padding:3px 10px;background:rgba(232,180,184,.2);border:1px solid var(--rose);border-radius:20px;font-size:11px;font-weight:500;color:var(--rose2)}
.shop-prog{margin-top:10px}
.shop-prog-bar{height:8px;background:var(--sf2);border:1px solid var(--border2);border-radius:20px;overflow:hidden}
.shop-prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lav));border-radius:20px;transition:width .3s ease}
.shop-prog-info{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--th);font-weight:500}
.shop-exchange-btn{margin-top:10px;padding:10px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;box-shadow:var(--shadow)}
.shop-exchange-btn:active{transform:translateY(2px);box-shadow:none}
.shop-exchange-btn:disabled{opacity:.35;cursor:not-allowed}
.shop-unlocked-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--rose);color:#fff;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;box-shadow:var(--shadow)}
.shop-add-btn{margin-top:10px;padding:14px;background:var(--sf);border:1.5px dashed var(--border2);border-radius:12px;text-align:center;cursor:pointer;font-family:inherit;color:var(--tm);font-size:13px;font-weight:500;width:100%}
.shop-add-btn:active{transform:translateY(2px)}

/* === MINI SHOP PREVIEW === */
.mini-shop{margin:10px 0}
.mini-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow)}
.mini-item.unlocked{border-color:var(--rose)}
.mini-item-img{width:56px;height:56px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.mini-item-img.locked{filter:grayscale(.6)}
.mini-item.unlocked .mini-item-img{border-color:var(--rose);filter:none}
.mini-item-info{flex:1;min-width:0}
.mini-item-name{font-size:13px;font-weight:700;font-family:'Gaegu',cursive;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-prog{height:5px;background:var(--sf2);border-radius:20px;overflow:hidden;margin-top:4px}
.mini-prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lav));border-radius:20px}
.mini-item-gp{font-size:11px;color:var(--rose2);font-weight:700;font-family:'Gaegu',cursive;white-space:nowrap}

/* === CALENDAR === */
.cal-month{text-align:center;font-size:17px;font-weight:700;margin:16px 0 12px;display:flex;align-items:center;justify-content:center;gap:14px;color:var(--rose2);font-family:'Gaegu',cursive}
.cal-nav{background:var(--card);border:1px solid var(--border);font-size:14px;cursor:pointer;color:var(--rose2);padding:4px 12px;border-radius:10px;box-shadow:var(--shadow);font-weight:700}
.cal-nav:active{transform:translateY(1px)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-day-header{text-align:center;font-size:11px;color:var(--th);padding:4px 0;font-weight:700;font-family:'Gaegu',cursive}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:12px;color:var(--tm);cursor:pointer;transition:all .2s;position:relative;font-weight:500}
.cal-day:active{transform:scale(.9)}
.cal-day.today{font-weight:700;color:var(--rose2);border:1.5px solid var(--rose)}
.cal-day.has-record{background:rgba(232,180,184,.2);color:var(--rose2);font-weight:700}
.cal-day.has-record::after{content:'♡';font-size:8px;color:var(--rose);position:absolute;bottom:2px}
.cal-day.selected{background:var(--rose);color:#fff;font-weight:700;box-shadow:var(--shadow)}
.cal-day.selected::after{color:#fff}
.cal-detail{border:1px solid var(--border);border-radius:12px;padding:14px;margin:6px 0;background:var(--card);box-shadow:var(--shadow);animation:bounceIn .25s ease}
.cal-detail-title{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--rose2);font-family:'Gaegu',cursive}
.cal-detail-item{font-size:12px;color:var(--tm);padding:4px 0}

/* === CONDITION CARD === */
.cond-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin:10px 0;box-shadow:var(--shadow);position:relative}
.cond-card::before{content:'';position:absolute;top:-6px;right:20px;width:50px;height:14px;background:rgba(200,181,217,.5);border-radius:2px;transform:rotate(3deg)}
.cond-title{font-size:14px;font-weight:700;color:var(--rose2);margin-bottom:10px;font-family:'Gaegu',cursive;display:flex;align-items:center;gap:6px}
.cond-main{display:flex;align-items:baseline;gap:6px;justify-content:center;margin:8px 0}
.cond-num{font-size:38px;font-weight:700;color:var(--rose2);font-family:'Gaegu',cursive;line-height:1}
.cond-unit{font-size:13px;color:var(--tm)}
.cond-goal{text-align:center;font-size:11px;color:var(--tm);margin-bottom:8px}
.cond-goal b{color:var(--lav2);font-family:'Gaegu',cursive}
.cond-input-row{display:flex;gap:8px;margin:10px 0}
.cond-input-row input{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:14px;text-align:center;background:var(--sf);color:var(--tx);font-family:inherit}
.cond-input-row input:focus{border-color:var(--rose);outline:none;background:#fff}
.cond-input-row button{background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.cond-sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.cond-sub{background:var(--sf);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}

.eval-label{font-size:11px;color:var(--tm);letter-spacing:2px;font-weight:500}
.eval-grade{font-size:56px;font-weight:700;margin:4px 0;font-family:'Nanum Pen Script',cursive;line-height:1}

.modal-bg{position:fixed;inset:0;background:rgba(90,70,60,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}

.price-row{display:flex;align-items:center;gap:8px;margin-top:8px;justify-content:center}

.hidden{display:none!important}

function seededRand(seed){return function(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646}}

var labels=['A','B','C'];var icons=['✨','💫','🌙'];var posInCycle=idx%5;var strMap={0:0,2:1,4:2};var li=strMap[posInCycle]!==undefined?strMap[posInCycle]:0;

var pick=CARDIO_OPTIONS[Math.floor(rng()*CARDIO_OPTIONS.length)];
return {type:'cardio',name:'무대 체력 훈련',icon:'💃',short:'무대체력',dur:pick.dur,desc:pick.desc,cardioName:pick.name};

function pad2(n){return (n<10?'0':'')+n}
function ymd(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}
function parseYmd(s){var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]))}
function getTierFromPrice(priceStr){
  if(!priceStr)return 1;
  var s=String(priceStr).replace(/,/g,'').replace(/\s/g,'');
  var manMatch=s.match(/([0-9]+(?:\.[0-9]+)?)\s*만/);
  var n;
  if(manMatch){n=parseFloat(manMatch[1])*10000;}
  else{var m=s.match(/([0-9]+(?:\.[0-9]+)?)/);if(!m)return 1;n=parseFloat(m[1]);}
  if(isNaN(n))return 1;
  var t=(S&&S.priceTiers)?S.priceTiers.slice().sort(function(a,b){return a-b}):[30000,100000,300000];
  if(n<t[0])return 1;
  if(n<t[1])return 2;
  if(n<t[2])return 3;
  return 4;
}
function makeContract(tier){
  var now=new Date();
  var end=new Date(now.getFullYear(),now.getMonth()+1,0);
  var daysToEnd=Math.ceil((end-now)/86400000);
  if(daysToEnd<7){end=new Date(now.getFullYear(),now.getMonth()+2,0);}
  var needAtt={1:8,2:12,3:16,4:20}[tier]||8;
  var needMood={1:2,2:3,3:3,4:4}[tier]||2;
  return {start:ymd(now),end:ymd(end),needAttendance:needAtt,needMoodAvg:needMood,needWeightGoal:tier===4,status:'active'};
}
function getContractProgress(item){
  if(!item.contract)return {attendance:0,moodAvg:0,weightOk:false,pct:0,meetsAll:false};
  var c=item.contract;
  var start=parseYmd(c.start);var end=parseYmd(c.end);
  var today=new Date();today.setHours(23,59,59,999);
  var rangeEnd=today<end?today:end;
  var days={};
  S.history.forEach(function(h){var d=new Date(h.year,h.month,h.day);if(d>=start&&d<=rangeEnd){days[h.year+'-'+h.month+'-'+h.day]=true;}});
  var attendance=Object.keys(days).length;
  var moodMap={'😊':5,'🙂':4,'😐':3,'😔':2,'😣':1};
  var mSum=0,mN=0;
  var cursor=new Date(start);
  while(cursor<=rangeEnd){
    var k=cursor.getFullYear()+'-'+(cursor.getMonth()+1)+'-'+cursor.getDate();
    var cc=S.condition[k];
    if(cc&&cc.mood&&moodMap[cc.mood]){mSum+=moodMap[cc.mood];mN++;}
    cursor.setDate(cursor.getDate()+1);
  }
  var moodAvg=mN?(mSum/mN):0;
  var weightOk=true;
  if(c.needWeightGoal){
    if(S.targetWeight&&S.weights.length){
      var lastW=S.weights[S.weights.length-1].kg;
      weightOk=Math.abs(lastW-S.targetWeight)<=1;
    } else weightOk=false;
  }
  var attPct=Math.min(1,attendance/c.needAttendance);
  var moodPct=Math.min(1,moodAvg/c.needMoodAvg);
  var wPct=c.needWeightGoal?(weightOk?1:0):1;
  var parts=c.needWeightGoal?[attPct,moodPct,wPct]:[attPct,moodPct];
  var pct=Math.round(parts.reduce(function(a,b){return a+b},0)/parts.length*100);
  var meetsAll=attendance>=c.needAttendance&&moodAvg>=c.needMoodAvg&&weightOk;
  return {attendance:attendance,moodAvg:moodAvg,weightOk:weightOk,pct:pct,meetsAll:meetsAll};
}
function runMonthEndCheck(){
  var today=new Date();today.setHours(0,0,0,0);
  (S.shop||[]).forEach(function(item){
    if(!item.contract||item.contract.status!=='active')return;
    var end=parseYmd(item.contract.end);
    if(today>end){
      var p=getContractProgress(item);
      item.contract.status=p.meetsAll?'approved':'failed';
      if(p.meetsAll)item.unlocked=true;
    }
  });
}

// === MONTHLY EVALUATION ===
function getMonthlyGrade(){
var now=new Date();var monthStart=new Date(now.getFullYear(),now.getMonth(),1);monthStart.setHours(0,0,0,0);
var workoutDays={};
S.history.forEach(function(h){var d=new Date(h.year,h.month,h.day);if(d>=monthStart&&d<=now)workoutDays[h.year+'-'+h.month+'-'+h.day]=true;});
var workoutCount=Object.keys(workoutDays).length;
var daysSoFar=now.getDate();
var workoutScore=Math.min(40,Math.round(workoutCount/Math.max(1,daysSoFar)*40));
var sleepSum=0,sleepN=0,waterSum=0,waterN=0,moodSum=0,moodN=0;
var moodMap={'😊':5,'🙂':4,'😐':3,'😔':2,'😣':1};
for(var i=0;i<daysSoFar;i++){
  var d=new Date(monthStart);d.setDate(monthStart.getDate()+i);
  var k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  var c=S.condition[k];if(!c)continue;
  if(c.sleep!=null){sleepSum+=c.sleep;sleepN++;}
  if(c.water){waterSum+=c.water;waterN++;}
  if(c.mood&&moodMap[c.mood]){moodSum+=moodMap[c.mood];moodN++;}
}
var sleepScore=sleepN?Math.min(20,Math.round((sleepSum/sleepN)/8*20)):0;
var waterScore=waterN?Math.min(15,Math.round((waterSum/waterN)/8*15)):0;
var moodScore=moodN?Math.min(10,Math.round((moodSum/moodN)/5*10)):0;
// weight trend
var weightScore=0;var reasons=[];
if(S.targetWeight&&S.weights.length>=2){
  var first=S.weights[0].kg;var last=S.weights[S.weights.length-1].kg;
  var towardTarget=(first>S.targetWeight&&last<first)||(first<S.targetWeight&&last>first)||Math.abs(last-S.targetWeight)<0.5;
  weightScore=towardTarget?15:5;
}
var score=workoutScore+sleepScore+waterScore+moodScore+weightScore;
var grade='D';
if(score>=85)grade='S';else if(score>=70)grade='A';else if(score>=55)grade='B';else if(score>=40)grade='C';
reasons.push('연습 '+workoutCount+'일');
if(sleepN)reasons.push('평균 수면 '+(sleepSum/sleepN).toFixed(1)+'h');
if(waterN)reasons.push('평균 물 '+(waterSum/waterN).toFixed(1)+'잔');
return {grade:grade,score:score,reasons:reasons};
}

function drawChart(){
var canvas=document.getElementById('wtCanvas');if(!canvas)return;
var ctx=canvas.getContext('2d');var dpr=window.devicePixelRatio||1;
canvas.width=canvas.offsetWidth*dpr;canvas.height=200*dpr;ctx.scale(dpr,dpr);
var W=canvas.offsetWidth,H=200;var data=S.weights.slice(-20);
var vals=data.map(function(w){return w.kg});
var minV=Math.min.apply(null,vals);var maxV=Math.max.apply(null,vals);
var min=Math.floor(minV)-1;var max=Math.ceil(maxV)+1;var range=max-min||1;
var padL=40,padR=10,padT=15,padB=25;var gw=W-padL-padR,gh=H-padT-padB;
ctx.strokeStyle='rgba(200,184,154,0.3)';ctx.lineWidth=1;
var step=1;if(range>10)step=2;if(range>20)step=5;if(range>50)step=10;
min=Math.floor(minV/step)*step-step;max=Math.ceil(maxV/step)*step+step;range=max-min||1;
for(var v=min;v<=max;v+=step){var y=padT+(max-v)/range*gh;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.fillStyle='#A89880';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(v,padL-4,y+3);}
ctx.beginPath();ctx.strokeStyle='#D4A017';ctx.lineWidth=2.5;ctx.lineJoin='round';
data.forEach(function(w,i){var x=padL+i/(data.length-1)*gw;var y=padT+(max-w.kg)/range*gh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
ctx.stroke();
data.forEach(function(w,i){var x=padL+i/(data.length-1)*gw;var y=padT+(max-w.kg)/range*gh;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#D4A017';ctx.fill();ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();});
ctx.fillStyle='#A89880';ctx.font='9px sans-serif';ctx.textAlign='center';
[0,Math.floor(data.length/2),data.length-1].forEach(function(i){if(!data[i])return;var x=padL+i/(data.length-1)*gw;ctx.fillText(data[i].date.split('.').slice(1).join('/'),x,H-5);});
}

function requestWake(){if('wakeLock' in navigator)navigator.wakeLock.request('screen').then(function(l){wakeLock=l;l.addEventListener('release',function(){wakeLock=null;});}).catch(function(){});}

var restTimer=null;var restEi=-1,restSi=-1;var restStart=0;var REST_SEC=60;
function startRest(ei,si){clearInterval(restTimer);restEi=ei;restSi=si;restStart=Date.now();requestWake();restTimer=setInterval(function(){var el=Math.floor((Date.now()-restStart)/1000);if(el>=REST_SEC){clearInterval(restTimer);updateRestUI(REST_SEC);restTimer=null;releaseWake();}else updateRestUI(el);},200);}
function restoreRestUI(){if(!restTimer||restEi<0)return;var el=Math.floor((Date.now()-restStart)/1000);updateRestUI(el>=REST_SEC?REST_SEC:el);}
function updateRestUI(sec){var el=document.getElementById('rest-'+restEi+'-'+restSi);if(!el)return;var pct=Math.min(100,Math.round(sec/REST_SEC*100));var left=REST_SEC-sec;var bar=el.querySelector('.rest-timer-fill');var txt=el.querySelector('.rest-timer-text');if(bar)bar.style.width=pct+'%';if(txt)txt.textContent=left>0?left+'s':'GO!';if(left<=0)el.classList.add('done-timer');}

} else {h+='<h3>'+ex.name+' 변경? 🔄</h3><span class="skip-count" style="font-size:24px;font-weight:900;color:var(--gold2);display:block;margin:6px 0;font-family:\'DotGothic16\',sans-serif">남은 변경: '+left+'번</span>';
h+='<div class="modal-btns"><button style="background:var(--sf);color:var(--tm)" onclick="closeModal()">유지</button><button style="background:var(--gold);color:#2C1810" onclick="doSwap('+exIdx+')">변경!</button></div>';}
h+='</div></div>';document.getElementById('modal').innerHTML=h;
}
function doSwap(exIdx){
var cats=['compound','hinge',null,'core'];var catName=cats[exIdx];
if(catName===null) catName=POOL.pull.some(function(e){return e.name===curRoutine().exercises[exIdx].name})?'pull':'push';
var pool=POOL[catName];var cur=curRoutine().exercises[exIdx].name;
var others=pool.filter(function(e){return e.name!==cur});
if(!others.length){closeModal();toast('다른 운동이 없어요!');return;}
var pick=others[Math.floor(Math.random()*others.length)];
S.swapped[S.idx+'_'+exIdx]=pick;
for(var s=0;s<10;s++){delete S.sets[exIdx+'_'+s]}
var mk=curMonthKey();S.swaps[mk]=(S.swaps[mk]||0)+1;
save();closeModal();toast('🔄 '+pick.name+'(으)로 변경!');render();
}

// === CROP ===
function showCropModal(src,mode){
var h='<div class="crop-modal"><div class="crop-title">드래그로 위치 조정 ✂️</div>';
h+='<div class="crop-area" id="cropArea"><img id="cropImg" src="'+src+'"></div>';
h+='<div class="crop-btns"><button class="crop-cancel" onclick="closeModal()">취소</button><button class="crop-save" onclick="saveCrop(\''+mode+'\')">완료 ✨</button></div></div>';
document.getElementById('modal').innerHTML=h;
var img=document.getElementById('cropImg');
img.onload=function(){
var area=document.getElementById('cropArea');var aw=area.offsetWidth,ah=area.offsetHeight;
var iw=img.naturalWidth,ih=img.naturalHeight;var scale=iw/ih>1?ah/ih:aw/iw;
img.style.width=(iw*scale)+'px';img.style.height=(ih*scale)+'px';
img.style.left=((aw-iw*scale)/2)+'px';img.style.top=((ah-ih*scale)/2)+'px';
var sx,sy,sl,st;
function onS(e){e.preventDefault();var p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;sl=parseFloat(img.style.left)||0;st=parseFloat(img.style.top)||0;}
function onM(e){if(sx===undefined)return;e.preventDefault();var p=e.touches?e.touches[0]:e;img.style.left=(sl+p.clientX-sx)+'px';img.style.top=(st+p.clientY-sy)+'px';}
function onE(){sx=undefined}
area.addEventListener('touchstart',onS,{passive:false});area.addEventListener('touchmove',onM,{passive:false});area.addEventListener('touchend',onE);
area.addEventListener('mousedown',onS);area.addEventListener('mousemove',onM);area.addEventListener('mouseup',onE);
};
}
function saveCrop(mode){
var img=document.getElementById('cropImg');var canvas=document.createElement('canvas');
canvas.width=180;canvas.height=180;var ctx=canvas.getContext('2d');
var l=parseFloat(img.style.left)||0;var t=parseFloat(img.style.top)||0;
var dw=parseFloat(img.style.width);var dh=parseFloat(img.style.height);
ctx.drawImage(img,-l/dw*img.naturalWidth,-t/dh*img.naturalHeight,180/dw*img.naturalWidth,180/dh*img.naturalHeight,0,0,180,180);
var dataUrl=canvas.toDataURL('image/jpeg',0.85);
if(mode==='addItem'&&window._tempItem){
var t=getTierFromPrice(window._tempItem.price);
S.shop.push({id:Date.now(),name:window._tempItem.name,img:dataUrl,price:window._tempItem.price,tier:t,contract:makeContract(t),unlocked:false,archived:false});
window._tempItem=null;save();closeModal();toast('📝 계약 체결!');
if(curTab!==1){curTab=1;switchTab(1);}else render();
} else closeModal();
}

function closeModal(){document.getElementById('modal').innerHTML=''}
function showConfetti(fromBottom){
var c=document.createElement('div');c.className='confetti';
var colors=['#D4A017','#FFD700','#E8C020','#4A6FA5','#5B9A3A','#C0392B','#FF8C42'];
for(var i=0;i<40;i++){var p=document.createElement('div');p.className='confetti-piece'+(fromBottom?' from-bottom':'');p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()+'s';p.style.width=(4+Math.random()*6)+'px';p.style.height=(4+Math.random()*6)+'px';c.appendChild(p);}
document.body.appendChild(c);setTimeout(function(){c.remove()},3000);
}
function exportBackup(){var d=JSON.stringify(S,null,2);var b=new Blob([d],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='idol-diary-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);toast('백업 완료! 📦');}
function importBackup(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(confirm('기존 데이터를 덮어쓸까요?')){S=d;save();render();toast('복원 완료! 📥');}}catch(err){toast('파일 오류!');}};r.readAsText(f);}
function resetData(){if(!confirm('정말 전체 리셋?'))return;if(!confirm('되돌릴 수 없어요!'))return;localStorage.removeItem('wk_idol');localStorage.removeItem('wk_prince');location.reload();}

// migrate
S.history.forEach(function(h){if(!h.year){var p=h.date.split('/');var n=new Date();h.month=parseInt(p[0])-1;h.day=parseInt(p[1]);h.year=n.getFullYear();}});
save();render();
</script>
